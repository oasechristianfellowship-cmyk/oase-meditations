<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meditations — OASE Christian Fellowship</title>
<style>
  @font-face {
    font-family: 'Garet';
    src: url('Garet-Heavy.woff2') format('woff2'),
         url('Garet-Heavy.woff') format('woff');
    font-weight: 700;
    font-style: normal;
  }

  @font-face {
    font-family: 'Garet';
    src: url('Garet-Book.woff2') format('woff2'),
         url('Garet-Book.woff') format('woff');
    font-weight: 400;
    font-style: normal;
  }

  :root {
    --navy: #3D5A6B;
    --teal: #4A7B7B;
    --gold: #B8956A;
    --cream: #F5F3F0;
    --white: #FFFFFF;
    --text: #2C3E50;
    --muted: #8A9BAA;
    --border: #DDE4EA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Garet', sans-serif;
    font-weight: 400;
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container { max-width: 660px; margin: 0 auto; }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeIn 0.7s ease;
  }

  .header-title {
    font-family: 'Garet', sans-serif;
    font-weight: 400;
    font-size: 38px;
    letter-spacing: 6px;
    color: var(--navy);
    text-transform: uppercase;
  }

  .header-sub {
    font-family: 'Garet', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--teal);
    margin-top: 6px;
  }

  .header-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 16px;
    font-weight: 400;
  }

  .divider {
    width: 50px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 14px auto 0;
  }

  /* NOW PLAYING */
  .now-playing {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px 28px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(61,90,107,0.07);
    animation: fadeIn 0.7s ease 0.1s both;
  }

  .np-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 400;
  }

  .np-title {
    font-family: 'Garet', sans-serif;
    font-weight: 400;
    font-size: 17px;
    color: var(--navy);
    margin-bottom: 20px;
    min-height: 22px;
  }

  .progress-bar {
    width: 100%; height: 3px;
    background: var(--border);
    border-radius: 3px;
    cursor: pointer;
    margin-bottom: 8px;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--teal), var(--navy));
    border-radius: 3px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -4px; top: -3px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--navy);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .progress-bar:hover .progress-fill::after { opacity: 1; }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .btn-play {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid var(--navy);
    background: var(--navy);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.2s;
  }

  .btn-play:hover { background: var(--teal); border-color: var(--teal); transform: scale(1.05); }

  .btn-skip {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 11px; letter-spacing: 1px;
    font-family: 'Garet', sans-serif;
    padding: 4px; transition: color 0.2s;
  }

  .btn-skip:hover { color: var(--navy); }

  .volume-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .vol-icon { color: var(--muted); font-size: 12px; }

  .volume-slider {
    -webkit-appearance: none;
    width: 65px; height: 2px;
    background: var(--border);
    border-radius: 2px;
    outline: none; cursor: pointer;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--navy); cursor: pointer;
  }

  /* PLAYLIST */
  .playlist-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 4px;
    font-weight: 400;
  }

  .track {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 6px;
    animation: fadeUp 0.5s ease both;
  }

  .track:nth-child(2) { animation-delay: 0.05s; }
  .track:nth-child(3) { animation-delay: 0.10s; }
  .track:nth-child(4) { animation-delay: 0.15s; }
  .track:nth-child(5) { animation-delay: 0.20s; }
  .track:nth-child(6) { animation-delay: 0.25s; }
  .track:nth-child(7) { animation-delay: 0.30s; }
  .track:nth-child(8) { animation-delay: 0.35s; }

  .track:hover { border-color: var(--teal); box-shadow: 0 2px 10px rgba(74,123,123,0.1); transform: translateY(-1px); }
  .track.active { border-color: var(--navy); background: #F0F5F8; }

  .track-num { font-size: 13px; color: var(--muted); min-width: 22px; text-align: center; font-weight: 400; }
  .track.active .track-num { color: var(--navy); font-weight: 400; }

  .playing-waves { display: none; gap: 2px; align-items: flex-end; height: 14px; min-width: 22px; justify-content: center; }
  .track.active.playing .playing-waves { display: flex; }
  .track.active.playing .track-num { display: none; }

  .wave { width: 3px; background: var(--navy); border-radius: 2px; animation: wave 0.7s ease-in-out infinite alternate; }
  .wave:nth-child(2) { animation-delay: 0.2s; }
  .wave:nth-child(3) { animation-delay: 0.4s; }

  @keyframes wave { from { height: 3px; } to { height: 13px; } }

  .track-icon {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--muted); flex-shrink: 0;
    transition: all 0.2s;
  }

  .track:hover .track-icon, .track.active .track-icon { border-color: var(--navy); color: var(--navy); background: #EBF2F7; }

  .track-info { flex: 1; }

  .track-title {
    font-family: 'Garet', sans-serif;
    font-weight: 400;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 2px;
  }

  .track.active .track-title { color: var(--navy); }
  .track-duration { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  audio { display: none; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">OASE</div>
    <div class="header-sub">Christian Fellowship</div>
    <p class="header-label">Meditations</p>
    <div class="divider"></div>
  </div>

  <div class="now-playing">
    <p class="np-label">Now Playing</p>
    <p class="np-title" id="current-title">Select a meditation to begin</p>
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="time-row">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
    <div class="controls">
      <button class="btn-skip" id="btn-prev">&#9664;&#9664; Prev</button>
      <button class="btn-play" id="btn-play">&#9654;</button>
      <button class="btn-skip" id="btn-next">Next &#9654;&#9654;</button>
      <div class="volume-wrap">
        <span class="vol-icon">&#9834;</span>
        <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.05" value="0.8">
      </div>
    </div>
  </div>

  <p class="playlist-label">All Meditations</p>
  <div id="track-list"></div>

</div>
<audio id="audio-el"></audio>

<script>
// ============================================================
// MEDITATIONS LIST — EDIT HERE TO ADD OR CHANGE TRACKS
//
// HOW TO ADD A NEW MEDITATION:
// 1. Upload the audio to Google Drive
// 2. Right-click → Share → "Anyone with the link" → Viewer → Copy link
// 3. The link looks like: https://drive.google.com/file/d/XXXXXXX/view
// 4. Copy only the ID (the long string between /d/ and /view)
// 5. Add a new line below:
//    { title: "Meditation Title", id: "PASTE_ID_HERE", duration: "00:00" },
// ============================================================

const tracks = [
  { title: "Meditation 1",  id: "1bkWUMPfYxDmnYYpqpUXhmWwDm4fn2y9C", duration: "59:47" },
  { title: "Meditation 2",  id: "1WFeJKjStdM-Wbg6mAhadHrG6axAtGUH8", duration: "57:05" },
  { title: "Meditation 3",  id: "1J3tqlf0jOOfrEqpiphttm0WFVw8B8Lx7", duration: "48:49" },
  { title: "Meditation 4",  id: "1wscoQPqXyDsBl5turAUMXNvxBsi3YkbK", duration: "56:02" },
  { title: "Meditation 5",  id: "1sFaoH_1emDm0MEnpKvKjJVkWl7jyvSQS", duration: "33:42" },
  { title: "Meditation 6",  id: "REPLACE_WITH_FILE_ID",                duration: "00:00" },
  { title: "Meditation 7",  id: "REPLACE_WITH_FILE_ID",                duration: "00:00" },
  { title: "Meditation 8",  id: "REPLACE_WITH_FILE_ID",                duration: "00:00" },
];

// ============================================================
// No need to edit below this line
// ============================================================

const audio    = document.getElementById('audio-el');
const btnPlay  = document.getElementById('btn-play');
const btnPrev  = document.getElementById('btn-prev');
const btnNext  = document.getElementById('btn-next');
const progBar  = document.getElementById('progress-bar');
const progFill = document.getElementById('progress-fill');
const timeCur  = document.getElementById('time-current');
const timeTot  = document.getElementById('time-total');
const npTitle  = document.getElementById('current-title');
const list     = document.getElementById('track-list');
const volSlide = document.getElementById('volume');

let currentIndex = -1, isPlaying = false;

function fmt(s) {
  if (isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
}

function buildPlaylist() {
  tracks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'track';
    div.innerHTML = `
      <div class="track-num">${i+1}</div>
      <div class="playing-waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
      <div class="track-icon">&#9654;</div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-duration">${t.duration}</div>
      </div>`;
    div.addEventListener('click', () => loadTrack(i, true));
    list.appendChild(div);
  });
}

function loadTrack(index, autoplay=false) {
  currentIndex = index;
  const t = tracks[index];
  audio.src = `https://drive.google.com/uc?export=download&id=${t.id}`;
  audio.volume = parseFloat(volSlide.value);
  npTitle.textContent = t.title;
  progFill.style.width = '0%';
  timeCur.textContent = '0:00';
  timeTot.textContent = t.duration;
  document.querySelectorAll('.track').forEach((el, i) => {
    el.classList.toggle('active', i===index);
    el.classList.remove('playing');
  });
  if (autoplay) {
    audio.play().then(() => {
      isPlaying = true;
      btnPlay.innerHTML = '&#9646;&#9646;';
      document.querySelectorAll('.track')[index].classList.add('playing');
    }).catch(()=>{});
  }
}

function togglePlay() {
  if (currentIndex===-1) { loadTrack(0,true); return; }
  if (isPlaying) {
    audio.pause(); isPlaying=false; btnPlay.innerHTML='&#9654;';
    document.querySelectorAll('.track')[currentIndex].classList.remove('playing');
  } else {
    audio.play(); isPlaying=true; btnPlay.innerHTML='&#9646;&#9646;';
    document.querySelectorAll('.track')[currentIndex].classList.add('playing');
  }
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  progFill.style.width=(audio.currentTime/audio.duration*100)+'%';
  timeCur.textContent=fmt(audio.currentTime);
  timeTot.textContent=fmt(audio.duration);
});

audio.addEventListener('ended', () => {
  if (currentIndex<tracks.length-1) loadTrack(currentIndex+1,true);
  else { isPlaying=false; btnPlay.innerHTML='&#9654;'; }
});

progBar.addEventListener('click', e => {
  if (!audio.duration) return;
  const r=progBar.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});

btnPlay.addEventListener('click', togglePlay);
btnPrev.addEventListener('click', ()=>{ if(currentIndex>0) loadTrack(currentIndex-1,isPlaying); });
btnNext.addEventListener('click', ()=>{ if(currentIndex<tracks.length-1) loadTrack(currentIndex+1,isPlaying); });
volSlide.addEventListener('input', ()=>{ audio.volume=parseFloat(volSlide.value); });

buildPlaylist();
</script>
</body>
</html>
